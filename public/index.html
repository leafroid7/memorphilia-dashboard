// Flatpickr 인스턴스 저장 — openDtPicker 사용
const _fpInstances = {};

// 날짜만 편집 (마감일용 — 시간 없음)
function makeDateOnlyHtml(field, val){
  const display = val ? escHtml(fmtDate(val)) : '날짜 입력';
  const cls = val ? '' : 'empty';
  return `<button class="dt-trigger ${cls}" id="dt-btn-${field}" onclick="openDateOnlyPicker('${field}')">${display}</button>
  <input type="hidden" id="dt-hidden-${field}" value="${escHtml(val||'')}">`;
}

function openDateOnlyPicker(field){
  const hiddenEl = document.getElementById(`dt-hidden-${field}`);
  const btnEl    = document.getElementById(`dt-btn-${field}`);
  if (!hiddenEl || !btnEl) return;
  if (_fpInstances[field]) { _fpInstances[field].destroy(); delete _fpInstances[field]; }

  const rect = btnEl.getBoundingClientRect();
  const input = document.createElement('input');
  input.type = 'text';
  input.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.bottom+4}px;width:1px;height:1px;opacity:0;pointer-events:none;`;
  document.body.appendChild(input);

  const defaultDate = hiddenEl.value ? parseDate(hiddenEl.value) : null;
  let pendingDate = null;

  const fp = flatpickr(input, {
    enableTime: false,
    disableMobile: true,
    closeOnSelect: false,
    defaultDate,
    locale: {
      firstDayOfWeek: 1,
      weekdays: { shorthand: ['일','월','화','수','목','금','토'], longhand: ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'] },
      months: { shorthand: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'], longhand: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'] }
    },
    onChange(selectedDates){ pendingDate = selectedDates[0] || null; },
    onReady(_d, _s, fp){
      const footer = document.createElement('div');
      footer.className = 'fp-footer';
      footer.innerHTML = `<button class="fp-btn fp-btn-delete">삭제</button><span style="flex:1"></span><button class="fp-btn fp-btn-cancel">취소</button><button class="fp-btn fp-btn-save">저장</button>`;
      footer.querySelector('.fp-btn-delete').onclick = () => { clearDeadline(); fp.close(); };
      footer.querySelector('.fp-btn-cancel').onclick = () => fp.close();
      footer.querySelector('.fp-btn-save').onclick = () => {
        if (pendingDate) {
          const pad = v=>String(v).padStart(2,'0');
          const dateStr = `${pendingDate.getFullYear()}-${pad(pendingDate.getMonth()+1)}-${pad(pendingDate.getDate())}`;
          hiddenEl.value = dateStr;
          btnEl.textContent = fmtDate(dateStr);
          btnEl.classList.remove('empty');
          saveField('deadline', dateStr);
          currentTodo.deadline = dateStr;
          currentTodo.deadlineEnd = null;
        }
        fp.close();
      };
      fp.calendarContainer.appendChild(footer);
    },
    onClose(){ setTimeout(()=>{ input.remove(); delete _fpInstances[field]; }, 100); }
  });
  _fpInstances[field] = fp;
  fp.open();
}

function openDtPicker(field){
  const hiddenEl = document.getElementById(`dt-hidden-${field}`);
  const btnEl    = document.getElementById(`dt-btn-${field}`);
  if (!hiddenEl || !btnEl) return;

  if (_fpInstances[field]) { _fpInstances[field].destroy(); delete _fpInstances[field]; }

  const rect = btnEl.getBoundingClientRect();
  const input = document.createElement('input');
  input.type = 'text';
  input.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.bottom + 4}px;width:1px;height:1px;opacity:0;pointer-events:none;`;
  document.body.appendChild(input);

  const defaultDate = notionValToLocalDate(hiddenEl.value) || null;
  let pendingDate = null;

  const fp = flatpickr(input, {
    enableTime: true,
    time_24hr: false,
    disableMobile: true,
    allowInput: true,
    defaultDate,
    locale: {
      firstDayOfWeek: 1,
      weekdays: { shorthand: ['일','월','화','수','목','금','토'], longhand: ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'] },
      months: { shorthand: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'], longhand: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'] },
      amPM: ['오전','오후']
    },
    onChange(selectedDates){ pendingDate = selectedDates[0] || null; },
    onReady(_d, _s, fp){
      const timeContainer = fp.calendarContainer.querySelector('.flatpickr-time');
      if (timeContainer) {
        const amPmEl = timeContainer.querySelector('.flatpickr-am-pm');
        if (amPmEl) timeContainer.insertBefore(amPmEl, timeContainer.firstChild);
      }
      const footer = document.createElement('div');
      footer.className = 'fp-footer';
      footer.innerHTML = `<button class="fp-btn fp-btn-delete">삭제</button><span style="flex:1"></span><button class="fp-btn fp-btn-cancel">취소</button><button class="fp-btn fp-btn-save">저장</button>`;
      footer.querySelector('.fp-btn-delete').onclick = () => { clearDt(field); fp.close(); };
      footer.querySelector('.fp-btn-cancel').onclick = () => fp.close();
      footer.querySelector('.fp-btn-save').onclick = () => {
        const d = pendingDate || (defaultDate ? defaultDate : null);
        if (d) {
          const kstISO = localDateToNotionKST(d);
          hiddenEl.value = kstISO;
          btnEl.textContent = fmtDateTime(kstISO);
          btnEl.classList.remove('empty');
          // 삭제 버튼 show (id 방식)
          const delBtn = document.getElementById(`dt-del-${field}`);
          if(delBtn) delBtn.style.display = 'inline-flex';
          saveDt(field, kstISO);
        }
        fp.close();
      };
      fp.calendarContainer.appendChild(footer);
    },
    onClose(){ setTimeout(()=>{ input.remove(); delete _fpInstances[field]; }, 100); }
  });

  _fpInstances[field] = fp;
  fp.open();
}

// 날짜+시간 삭제
async function clearDt(field){
  if(!currentTodo)return;
  const updates = field==='startTime' ? {startTime:null} : {endTime:null};
  try{
    await api({action:'updateTodo'},{pageId:currentTodo.id,updates});
    currentTodo[field]=null;
    updateCache(currentTodo.id,{[field]:null});
    // DOM 직접 업데이트
    const btn    = document.getElementById(`dt-btn-${field}`);
    const hidden = document.getElementById(`dt-hidden-${field}`);
    const delBtn = document.getElementById(`dt-del-${field}`);
    if(btn){ btn.textContent='날짜·시간 입력'; btn.classList.add('empty'); }
    if(hidden) hidden.value='';
    if(delBtn) delBtn.style.display='none';
    showToast('삭제됐어요');
  }catch(e){showToast('삭제 실패: '+e.message);}
}

// 마감일 삭제
async function clearDeadline(){
  if(!currentTodo)return;
  try{
    await api({action:'updateTodo'},{pageId:currentTodo.id,updates:{deadline:null}});
    currentTodo.deadline=null; currentTodo.deadlineEnd=null;
    updateCache(currentTodo.id,{deadline:null,deadlineEnd:null});
    // 마감일 셀 전체 재렌더
    const dlCell=document.getElementById('dt-btn-deadline')?.closest('.detail-value');
    if(dlCell) dlCell.innerHTML=makeDeadlineHtml(null,null);
    showToast('마감일이 삭제됐어요');
  }catch(e){showToast('삭제 실패: '+e.message);}
}

async function saveDt(field, val){
  if(!currentTodo) return;
  const updates = field==='startTime' ? {startTime:val} : {endTime:val};
  try{
    await api({action:'updateTodo'},{pageId:currentTodo.id, updates});
    currentTodo[field]=val;
    updateCache(currentTodo.id,{[field]:val});
    showToast('저장됐어요');
  }catch(e){showToast('저장 실패: '+e.message);}
}

function togglePriDropdown(){

async function savePriority(val){
  if(!currentTodo)return;
  const dd=document.getElementById('priDropdown');
  if(dd)dd.style.display='none';
  try{
    await api({action:'updateTodo'},{pageId:currentTodo.id,updates:{priority:val}});

// Start / End 버튼 — 언제든 재클릭 가능, DOM 교체 없이 직접 업데이트
async function handleStart(){
  if(!currentTodo)return;
  const btn=document.getElementById('btnStart');
  const orig=btn.innerHTML;
  btn.disabled=true; btn.innerHTML=`<div class="spinner-sm"></div>`;
  try{
    const utcNow=nowKSTLocal();
    await api({action:'updateTodo'},{pageId:currentTodo.id,updates:{status:'🌗In Progress',startTime:utcNow}});
    currentTodo.status='🌗In Progress'; currentTodo.startTime=utcNow;
    updateCache(currentTodo.id,{status:'🌗In Progress',startTime:utcNow});
    // 상태 배지만 직접 업데이트
    _refreshStatusBadge('🌗In Progress');
    // Start 버튼 표시값 업데이트
    const startBtn=document.getElementById('dt-btn-startTime');
    const startHidden=document.getElementById('dt-hidden-startTime');
    if(startBtn){startBtn.textContent=fmtDateTime(utcNow);startBtn.classList.remove('empty');}
    if(startHidden)startHidden.value=utcNow;
    updatePanel(selectedDate.y,selectedDate.m,selectedDate.d);
    showToast('▶ 시작됐어요');
  }catch(e){showToast('오류: '+e.message);}
  finally{btn.disabled=false; btn.innerHTML=orig;}
}
async function handleEnd(){
  if(!currentTodo)return;
  const btn=document.getElementById('btnEnd');
  const orig=btn.innerHTML;
  btn.disabled=true; btn.innerHTML=`<div class="spinner-sm"></div>`;
  try{
    const utcNow=nowKSTLocal();
    const startTime=currentTodo.startTime;

    // End Time + 상태 변경
    await api({action:'updateTodo'},{pageId:currentTodo.id,updates:{status:'🌕Done',endTime:utcNow}});
    currentTodo.status='🌕Done'; currentTodo.endTime=utcNow;
    updateCache(currentTodo.id,{status:'🌕Done',endTime:utcNow});
    _refreshStatusBadge('🌕Done');

    const endBtn=document.getElementById('dt-btn-endTime');
    const endHidden=document.getElementById('dt-hidden-endTime');
    if(endBtn){endBtn.textContent=fmtDateTime(utcNow);endBtn.classList.remove('empty');}
    if(endHidden)endHidden.value=utcNow;

    // Start Time이 있으면 데드라인을 Start~End 범위로 업데이트
    if(startTime){
      await api({action:'updateTodo'},{pageId:currentTodo.id,updates:{
        deadline: startTime,
        deadlineEnd: utcNow
      }});
      currentTodo.deadline=startTime;
      currentTodo.deadlineEnd=utcNow;
      updateCache(currentTodo.id,{deadline:startTime,deadlineEnd:utcNow});
      // 마감일 셀 전체를 makeDeadlineHtml로 업데이트
      const dlCell=document.getElementById('dt-btn-deadline')?.closest('.detail-value');
      if(dlCell) dlCell.innerHTML=makeDeadlineHtml(startTime, utcNow);
    }

    updatePanel(selectedDate.y,selectedDate.m,selectedDate.d);
    showToast('■ 완료됐어요');
  }catch(e){showToast('오류: '+e.message);}
  finally{btn.disabled=false; btn.innerHTML=orig;}
}

// localStorage에서 라벨 커스텀만 불러오기
function loadPresets() {
  try {
    const saved = JSON.parse(localStorage.getItem('mempo_presets') || '[]');
    return DEFAULT_PRESETS.map((p, i) => ({
      ...p,
      label: saved[i]?.label || p.label
    }));
  } catch { return DEFAULT_PRESETS; }
}

function savePresetLabels(labels) {
  const data = DEFAULT_PRESETS.map((p, i) => ({ label: labels[i] || p.label }));
  localStorage.setItem('mempo_presets', JSON.stringify(data));
}

let _activePresetIdx = null;

function renderPresetButtons() {
  const presets = loadPresets();
  const row = document.getElementById('presetBtnRow');
  const editItems = document.getElementById('presetEditItems');
  if (!row || !editItems) return;

  // 버튼 렌더
  row.innerHTML = '';
  presets.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (_activePresetIdx === i ? ' active' : '');
    btn.textContent = p.label;
    btn.addEventListener('click', () => applyPreset(i));
    row.appendChild(btn);
  });

  // 편집 아이템 렌더
  editItems.innerHTML = '';
  presets.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'preset-edit-item';
    item.innerHTML = `
      <div class="preset-edit-num">${i + 1}</div>
      <input class="preset-edit-name" type="text" value="${escHtml(p.label)}"
        data-idx="${i}" placeholder="버튼 이름">
      <span style="font-size:10px;color:var(--text-3);">${escHtml(p.apTitle)}</span>`;
    const input = item.querySelector('input');
    input.addEventListener('change', () => {
      const labels = loadPresets().map(x => x.label);
      labels[i] = input.value.trim() || DEFAULT_PRESETS[i].label;
      savePresetLabels(labels);
      renderPresetButtons();
    });
    editItems.appendChild(item);
  });
}

function applyPreset(idx) {
  const presets = loadPresets();
  const p = presets[idx];
  _activePresetIdx = (_activePresetIdx === idx) ? null : idx; // 토글

  if (_activePresetIdx === null) {
    // 해제: 폼 초기화
    document.getElementById('newTitle').value = '';
    selPriVal = null;
    selApId = null;
    document.getElementById('apSelectedWrap').innerHTML = '';
    document.querySelectorAll('.pri-select-btn').forEach(b => b.classList.remove('active'));
  } else {
    // 적용
    document.getElementById('newTitle').value = p.title;

    // Priority 선택
    selPriVal = p.priority;
    document.querySelectorAll('.pri-select-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.val === p.priority);
    });

    // 액션 플랜
    selApId = p.apId;
    document.getElementById('apSelectedWrap').innerHTML =
      `<div class="ap-selected-tag">${escHtml(p.apTitle)}<button onclick="clearAp()">✕</button></div>`;

    // est input 업데이트
    const estInput = document.getElementById('newEst');
    if (estInput) estInput.value = p.est;

    // groupMode — dataset에 저장해서 submitCreate에서 읽음
    document.getElementById('newTitle').dataset.presetGroupMode = p.groupMode;
  }

  renderPresetButtons();
}

async function submitCreate(){
  const titleEl=document.getElementById('newTitle');
  const title=titleEl.value.trim();
  const deadline=document.getElementById('newDeadline').value;
  const note=document.getElementById('newNote')?.value.trim()||'';
  const presetGroupMode = titleEl.dataset.presetGroupMode || null;
  // est: newEst input에서 직접 읽음 (프리셋 적용 시 input 값도 업데이트됨)
  const estInput = document.getElementById('newEst');
  const est = estInput ? (Number(estInput.value) || 30) : 30;
  if(!title){showToast('제목을 입력해주세요');titleEl.focus();return;}
  const btn=document.getElementById('createSubmitBtn');
  btn.disabled=true;btn.innerHTML=`<div class="spinner-sm"></div> 생성 중...`;
  try{
    await api({action:'createTodo'},{
      title, priority:selPriVal, deadline:deadline||null,
      actionPlanId:createIsMemo?null:selApId,
      isMemo:createIsMemo,
      est,
      note: note||undefined,
      groupMode: selGmVal||presetGroupMode||undefined
    });
    const[cy,cm]=deadline?deadline.split('-').map(Number):[viewYear,viewMonth];
    delete todoCache[`${cy}-${cm}`];
    closeCreate();
    showToast(createIsMemo?'📝 메모가 추가됐어요':'✅ 할일이 추가됐어요');
    if(currentMode==='memo') await loadMemoMode();
    else await loadAndRender();
  }catch(e){showToast('오류: '+e.message);btn.disabled=false;btn.textContent='생성하기';}
}
document.getElementById('newTitle').addEventListener('keydown',e=>{if(e.key==='Enter')submitCreate();});

    document.getElementById('panelFilterTabs')?.classList.remove('force-hide');
    if(filterBar) filterBar.classList.remove('force-hide');
    loadAndRender();
  }
}

async function loadMemoMode(){
  document.getElementById('todoContainer').innerHTML=
    `<div class="loading-state"><div class="spinner"></div><p style="font-size:12px;color:var(--text-3)">메모 불러오는 중...</p></div>`;
  try{
    const data=await api({action:'getMemos'});
    renderMemoList(data.todos);
  }catch(err){
    document.getElementById('todoContainer').innerHTML=
      `<div class="error-state">⚠️ 메모를 불러오지 못했어요.<br>${escHtml(err.message)}</div>`;
  }
}

function renderMemoList(todos){
  const container=document.getElementById('todoContainer');
  if(!todos.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">📝</div><p>메모가 없어요</p></div>`;
    return;
  }
  const list=document.createElement('div');list.className='todo-list';
  todos.forEach(t=>{
    const done=t.status?.includes('Done');
    const prog=t.status?.includes('Progress');
    const el=document.createElement('div');
    el.className='todo-item'+(done?' is-done':prog?' is-progress':'');
    const dateStr=t.deadline?fmtDate(t.deadline):'';
    el.innerHTML=`
      <div class="todo-status-dot ${statusClass(t.status)}"></div>
      <div class="todo-content">
        <div class="todo-title">${escHtml(t.title)}</div>
        <div class="todo-meta">
          ${priBadgeHtml(t.priority)}
          ${t.note?`<span style="font-size:11px;color:var(--text-3)">${escHtml(t.note.slice(0,30))}${t.note.length>30?'…':''}</span>`:''}
          ${dateStr?`<span style="font-size:10px;color:var(--text-3);margin-left:auto">${escHtml(dateStr)}</span>`:''}
        </div>
      </div>`;
    el.addEventListener('click',()=>openDetail(t));
    list.appendChild(el);
  });
  container.innerHTML='';container.appendChild(list);
}

// ══════════════════════════════════════════════════════
// 월 이동
// ══════════════════════════════════════════════════════
function changeMonth(d){
  viewMonth+=d;
  if(viewMonth>12){viewMonth=1;viewYear++;}
  if(viewMonth<1){viewMonth=12;viewYear--;}
  loadAndRender();
}
function goToToday(){viewYear=_today.y;viewMonth=_today.m;selectedDate={..._today};loadAndRender();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeCreate();}});

// ══════════════════════════════════════════════════════
// 메인
// ══════════════════════════════════════════════════════
async function loadAndRender(){
  document.getElementById('todoContainer').innerHTML=
    `<div class="loading-state"><div class="spinner"></div><p style="font-size:12px;color:var(--text-3)">불러오는 중...</p></div>`;
  try{
    const todos=await fetchTodos(viewYear,viewMonth);
    const dm=buildDateMap(todos);
    renderCalendar(dm);
    updatePanel(selectedDate.y,selectedDate.m,selectedDate.d);
  }catch(err){
    document.getElementById('todoContainer').innerHTML=
      `<div class="error-state">⚠️ 데이터를 불러오지 못했어요.<br>${escHtml(err.message)}</div>`;
    renderCalendar({});
  }
}
loadAndRender();
